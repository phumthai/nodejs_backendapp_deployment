# infra/kustomize/base/kustomization.yaml
# Workshop: GitOps with Argo CD — Day 1, Section 4, Lab 7
# Base kustomization — รวม resources ทั้งหมดของ base

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Metadata จะถูก inherit โดย overlay
metadata:
  name: my-app-base

# รายการ resource ที่อยู่ใน base
resources:
- deployment.yaml
- service.yaml

# Common labels ที่จะถูก inject เข้าทุก resource
commonLabels:
  app: my-app
  managed-by: kustomize
images:
- name: ghcr.io/phumthai/nodejs-backendapp
  newName: ghcr.io/phumthai/app-repo
  newTag: 9c4f8e5
